name: CI (PRs and non-main pushes)

on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]

env:
  DOTNET_NOLOGO: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"

jobs:
  build:
    name: Build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore .NET solution
        run: dotnet restore CodeFlow.slnx

      - name: Build .NET solution (Release)
        run: dotnet build CodeFlow.slnx --configuration Release --no-restore

      # sc-453: DockerRequired tests pull real images from docker.io and exercise the local
      # Docker daemon; CI runners can't reliably run them, so they're opt-in locally with
      # `dotnet test --filter "Category=DockerRequired"`.
      - name: Run Runtime tests
        run: dotnet test CodeFlow.Runtime.Tests/CodeFlow.Runtime.Tests.csproj --no-build --configuration Release --filter "Category!=DockerRequired"

      - name: Run Contracts tests
        run: dotnet test CodeFlow.Contracts.Tests/CodeFlow.Contracts.Tests.csproj --no-build --configuration Release

      # Keep Testcontainers-backed API end-to-end tests quarantined from PR CI, but run the
      # broader API unit/component slice instead of a single auth fixture.
      - name: Run API non-E2E tests
        run: dotnet test CodeFlow.Api.Tests/CodeFlow.Api.Tests.csproj --no-build --configuration Release --filter "Category!=EndToEnd&FullyQualifiedName!~RabbitMqDlqRetryTransportIntegrationTests"

      - name: Set up Node 24
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: codeflow-ui/package-lock.json

      - name: Install UI deps
        working-directory: codeflow-ui
        run: npm ci

      - name: Build UI
        working-directory: codeflow-ui
        run: npm run build

      - name: Validate production compose renders
        run: docker compose --env-file deploy/.env.example -f deploy/docker-compose.prod.yml config > /dev/null

      # sc-537: defensive audit. Fails CI if an api/worker Dockerfile or compose service ever
      # gains DooD vestiges (docker socket mount, docker CLI install, or unjustified group_add).
      # The sandbox-controller subtree is allowed to mount the socket — that's the whole
      # point of having it.
      - name: Audit no DooD on app tier
        run: ./scripts/audit-no-dood-on-app-tier.sh
