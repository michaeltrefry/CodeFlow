# Sandbox-controller configuration — example.
#
# Copy to controller-config.dev.toml (or controller-config.toml in prod) and
# fill in the paths. Validation happens at startup; missing fields fail fast.

[server]
# host:port to bind. mTLS-only — there is no plaintext listener. Prod (sc-535)
# does NOT publish this port outside the controller-internal compose network.
listen = "0.0.0.0:8443"

[tls]
# Server cert + key for the controller's mTLS listener. The cert's CN should be
# `codeflow-sandbox-controller`; the api/worker pin this on their side.
#
# NOTE: prod compose mounts the host TLS dir at /etc/cfsc-tls (un-nested from
# /etc/cfsc on purpose — see docker-compose.prod.yml comment for why). The
# bootstrap-ca.sh script names the CA bundle ca.pem, so the client_ca_path
# below points at /etc/cfsc-tls/ca.pem rather than client-ca.pem.
cert_path      = "/etc/cfsc-tls/server.pem"
key_path       = "/etc/cfsc-tls/server.key"

# CA bundle that issued the api/worker client certs. Any client whose cert is
# not signed by this CA fails the TLS handshake before reaching the HTTP layer.
client_ca_path = "/etc/cfsc-tls/ca.pem"

# Allowlist of client cert subjects. A client cert must (a) be signed by
# client_ca_path and (b) match at least one entry here. Each entry's set fields
# (CN, O, OU) must all match the cert's Subject. Set at least one of CN/O/OU.
[[tls.allowed_client_subjects]]
common_name  = "codeflow-api"
organization = "trefry"

[[tls.allowed_client_subjects]]
common_name  = "codeflow-worker"
organization = "trefry"

[logging]
# debug | info | warn | error
level = "info"

[runner]
# Path to the docker daemon's unix socket. Defaults to /var/run/docker.sock
# when empty. The controller's container mounts this from the host (sc-538).
docker_socket_path = "/var/run/docker.sock"

# Image pull timeout (separate budget from per-job timeout so a slow registry
# doesn't eat into the job's budget).
image_pull_timeout_seconds = 600

# Best-effort teardown budget — controller waits up to this long for a
# kill/remove before logging a warning and giving up.
container_teardown_timeout_seconds = 30

[workspace]
# Absolute path to the per-trace workspace root (sc-531). Phase 1 uses a
# host bind-mount; Phase 2 uses a shared NFS mount on both VMs at the same
# path. The controller's container mounts this read-only.
workdir_root = "/opt/codeflow/workdirs"

# Subdirectory name (single segment, no separators) where per-job results
# live under each trace dir. Default ".results". The controller creates
# {workdir_root}/{traceId}/{results_dir_name}/{jobId}/ at /run time and
# mounts it rw at /artifacts inside the sandbox.
results_dir_name = ".results"

# === IMAGE ALLOWLIST (sc-530) ================================================
#
# Default-deny. An empty `images.allowed` list means EVERY /run is rejected
# with image_not_allowed. Add an entry per (registry, repository) namespace
# you want sandboxed jobs to be allowed to run.
#
# Pattern semantics (apply to BOTH `repository` and `tag`):
#   "exact"     — match this value exactly
#   "prefix-*"  — trailing wildcard; everything starting with "prefix-"
#   "*"         — any value (use sparingly)
#
# Tag-only: empty tag ("") defaults to matching "latest" only.
#
# `registry` is always exact-match — no wildcards. By design: an attacker
# can stand up an arbitrary registry and a registry wildcard would let them
# in. Pin to known hostnames.
#
# Repository wildcards let operators trust namespaces — e.g.
# `repository = "dotnet/*"` trusts every repo under that prefix at the
# configured registry. Use `prefix/*` (with the trailing slash) so the
# match is bounded to that namespace; `prefix*` would also match
# `prefixcore-imposter` which is rarely what you want.
#
# No regex, no internal wildcards — auditable plain English by design.
#
# Hot-reload: send SIGHUP to the controller process to reload this section
# without restarting (TLS / listen address are NOT reloadable on HUP).

# Uncomment the entries that match your trust set. Examples:
#
# # Trust every repo under your own GHCR org with any tag.
# [[images.allowed]]
# registry   = "ghcr.io"
# repository = "trefry/*"
# tag        = "*"
#
# # Trust all of Microsoft's .NET base images at any tag (sdk, runtime, aspnet).
# [[images.allowed]]
# registry   = "mcr.microsoft.com"
# repository = "dotnet/*"
# tag        = "*"
#
# # Trust Docker Hub's official-images namespace pinned to major versions.
# # `library/*` is the namespace where the curated official images live
# # (alpine, node, python, golang, postgres, ...).
# [[images.allowed]]
# registry   = "docker.io"
# repository = "library/*"
# tag        = "*"
#
# # If you want a tighter posture, prefer narrower entries instead:
# # [[images.allowed]]
# # registry   = "ghcr.io"
# # repository = "trefry/dotnet-tester"
# # tag        = "10.0-sdk-*"

[sweeper]
# Periodic cleanup of orphaned containers + stale per-job results dirs (sc-533).
# Per-job teardown is synchronous to /run; these settings cover the residual
# crashed-controller / failed-teardown cases. ContainerTTL must be larger than
# any per-job timeout the controller will accept — otherwise in-flight jobs
# could be killed mid-run.
#
# Zero values fall back to package defaults: 30m interval, 24h container TTL,
# 7d results TTL.
interval_seconds      = 1800   # 30m
container_ttl_seconds = 86400  # 24h
results_ttl_seconds   = 604800 # 7d

[telemetry]
# OTLP collector endpoint (sc-534). Empty disables export — all instruments
# become no-ops, useful for local dev. The trace + metric exporters use HTTP
# to /v1/traces and /v1/metrics under this base.
otlp_endpoint   = ""

# Surfaces as service.name in resource attributes. Default "sandbox-controller".
service_name    = "sandbox-controller"

# Surfaces as service.version. Empty falls back to the build-time commit hash.
service_version = ""
