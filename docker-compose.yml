networks:
  mcp-shared:
    external: true
services:
  mariadb:
    image: mariadb:11.4
    container_name: codeflow-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: codeflow_root
      MARIADB_DATABASE: codeflow
      MARIADB_USER: codeflow
      MARIADB_PASSWORD: codeflow_dev
    ports:
      - "3306:3306"
    volumes:
      - codeflow-mariadb-data:/var/lib/mysql
    healthcheck:
      test:
        - CMD-SHELL
        - mariadb-admin ping --host=127.0.0.1 --user=$$MARIADB_USER --password=$$MARIADB_PASSWORD
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  rabbitmq:
    image: rabbitmq:4.0-management
    container_name: codeflow-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: codeflow
      RABBITMQ_DEFAULT_PASS: codeflow_dev
      RABBITMQ_DEFAULT_VHOST: codeflow
    ports:
      - "5673:5672"
      - "15673:15672"
    volumes:
      - codeflow-rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test:
        - CMD
        - rabbitmq-diagnostics
        - -q
        - ping
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  jaeger:
    image: jaegertracing/jaeger:2.17.0
    container_name: codeflow-jaeger
    restart: unless-stopped
    command:
      - --set=receivers.otlp.protocols.grpc.endpoint=0.0.0.0:4317
      - --set=receivers.otlp.protocols.http.endpoint=0.0.0.0:4318
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"

  codeflow-artifacts-init:
    image: alpine:3.20
    container_name: codeflow-artifacts-init
    restart: "no"
    command:
      - /bin/sh
      - -c
      - mkdir -p /app/artifacts && chown -R 1654:1654 /app/artifacts
    volumes:
      - codeflow-artifacts:/app/artifacts

  codeflow-api:
    build:
      context: .
      dockerfile: CodeFlow.Api/Dockerfile
    container_name: codeflow-api
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      codeflow-artifacts-init:
        condition: service_completed_successfully
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      CODEFLOW_DB_CONNECTION_STRING: Server=mariadb;Port=3306;Database=codeflow;User=codeflow;Password=codeflow_dev;
      RabbitMq__Host: rabbitmq
      RabbitMq__Port: "5672"
      RabbitMq__VirtualHost: codeflow
      RabbitMq__Username: codeflow
      RabbitMq__Password: codeflow_dev
      Observability__OtlpEndpoint: http://jaeger:4317
      Observability__EnableConsoleExporter: "false"
      Auth__DevelopmentBypass: "true"
      Auth__RequireHttpsMetadata: "false"
      Cors__AllowedOrigins__0: http://localhost:4200
      Cors__AllowedOrigins__1: http://localhost:8080
      Artifacts__RootDirectory: /app/artifacts
      DeadLetter__ManagementHost: rabbitmq
      DeadLetter__ManagementPort: "15672"
      DeadLetter__VirtualHost: codeflow
      DeadLetter__Username: codeflow
      DeadLetter__Password: codeflow_dev
      Secrets__MasterKey: ${Secrets__MasterKey:-}
      OpenAI__ApiKey: ${OpenAI__ApiKey:-}
      Anthropic__ApiKey: ${Anthropic__ApiKey:-}
    ports:
      - "5080:8080"
    volumes:
      - codeflow-artifacts:/app/artifacts
    networks:
      - default
      - mcp-shared

  codeflow-worker:
    build:
      context: .
      dockerfile: CodeFlow.Worker/Dockerfile
    container_name: codeflow-worker
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      codeflow-api:
        condition: service_started
      codeflow-artifacts-init:
        condition: service_completed_successfully
    environment:
      DOTNET_ENVIRONMENT: Development
      CODEFLOW_DB_CONNECTION_STRING: Server=mariadb;Port=3306;Database=codeflow;User=codeflow;Password=codeflow_dev;
      RabbitMq__Host: rabbitmq
      RabbitMq__Port: "5672"
      RabbitMq__VirtualHost: codeflow
      RabbitMq__Username: codeflow
      RabbitMq__Password: codeflow_dev
      Observability__OtlpEndpoint: http://jaeger:4317
      Observability__EnableConsoleExporter: "false"
      Artifacts__RootDirectory: /app/artifacts
      Secrets__MasterKey: ${Secrets__MasterKey:-}
      OpenAI__ApiKey: ${OpenAI__ApiKey:-}
      Anthropic__ApiKey: ${Anthropic__ApiKey:-}
    volumes:
      - codeflow-artifacts:/app/artifacts
    networks:
      - default
      - mcp-shared

  codeflow-ui:
    build:
      context: .
      dockerfile: codeflow-ui/Dockerfile
    container_name: codeflow-ui
    restart: unless-stopped
    depends_on:
      - codeflow-api
    ports:
      - "4200:80"

volumes:
  codeflow-mariadb-data:
  codeflow-rabbitmq-data:
  codeflow-artifacts:
