networks:
  mcp-shared:
    external: true
  trefry-network:
    external: true
  # Mirrors prod (deploy/docker-compose.prod.yml): api/worker only reach the
  # sandbox controller over this network. Not marked internal locally so the
  # initial controller image build can pull from registry; flip to
  # `internal: true` if you want closer prod parity after first build.
  controller-internal:
services:
  rabbitmq:
    image: rabbitmq:4.0-management
    container_name: codeflow-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: codeflow
      RABBITMQ_DEFAULT_PASS: codeflow_dev
      RABBITMQ_DEFAULT_VHOST: codeflow
    ports:
      - "5673:5672"
      - "15673:15672"
    volumes:
      - codeflow-rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test:
        - CMD
        - rabbitmq-diagnostics
        - -q
        - ping
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  aspire-dashboard:
    image: mcr.microsoft.com/dotnet/aspire-dashboard:9.0
    container_name: codeflow-aspire-dashboard
    restart: unless-stopped
    environment:
      DASHBOARD__FRONTEND__AUTHMODE: Unsecured
      DASHBOARD__OTLP__AUTHMODE: Unsecured
    ports:
      - "18888:18888"
      - "4317:18889"

  codeflow-artifacts-init:
    image: alpine:3.20
    container_name: codeflow-artifacts-init
    restart: "no"
    command:
      - /bin/sh
      - -c
      - mkdir -p /app/artifacts && chown -R 1654:1654 /app/artifacts
    volumes:
      - codeflow-artifacts:/app/artifacts

  codeflow-workdir-init:
    image: alpine:3.20
    container_name: codeflow-workdir-init
    restart: "no"
    command:
      - /bin/sh
      - -c
      - mkdir -p /workspace && chown -R 1654:1654 /workspace
    volumes:
      - codeflow-workdir:/workspace

  # HAA-18 — homepage assistant's per-conversation workspace root. Mounted under the unified
  # /workspace tree at /workspace/assistant, owned by the api container's `app` user (uid 1654)
  # so Directory.CreateDirectory succeeds when the user assigns a role with host-tool grants.
  codeflow-assistant-workspace-init:
    image: alpine:3.20
    container_name: codeflow-assistant-workspace-init
    restart: "no"
    command:
      - /bin/sh
      - -c
      - mkdir -p /workspace/assistant && chown -R 1654:1654 /workspace/assistant
    volumes:
      - codeflow-assistant-workspace:/workspace/assistant

  # Generates dev mTLS material + a derived controller config.toml into the
  # cfsc-tls / cfsc-config volumes shared with the controller and api/worker.
  # Idempotent — re-runs are a no-op once the certs + config exist. Production
  # uses the canonical sandbox-controller/deploy/controller-config.toml; this
  # init service derives a dev variant. See scripts/dev-cfsc-bootstrap.sh.
  codeflow-cfsc-init:
    image: alpine:3.20
    container_name: codeflow-cfsc-init
    restart: "no"
    entrypoint: ["/bin/sh", "/usr/local/bin/dev-cfsc-bootstrap.sh"]
    environment:
      TLS_DIR: /etc/cfsc-tls
      CFG_DIR: /etc/cfsc
    volumes:
      - ./scripts/dev-cfsc-bootstrap.sh:/usr/local/bin/dev-cfsc-bootstrap.sh:ro
      - codeflow-cfsc-tls:/etc/cfsc-tls
      - codeflow-cfsc-config:/etc/cfsc

  # Mirrors prod (deploy/docker-compose.prod.yml `codeflow-sandbox-controller`)
  # with dev carve-outs: AppArmor/seccomp/internal-network removed because they
  # require host-side setup not available on Docker Desktop, and the image is
  # built from the local source tree rather than pulled by tag. Container.run
  # routes through this service when api/worker have
  # `ContainerTools__Backend=SandboxController`.
  codeflow-sandbox-controller:
    build:
      context: ./sandbox-controller
      dockerfile: deploy/Dockerfile
      args:
        COMMIT: ${COMMIT:-dev}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    image: codeflow-sandbox-controller:dev
    container_name: codeflow-sandbox-controller
    restart: unless-stopped
    depends_on:
      codeflow-cfsc-init:
        condition: service_completed_successfully
      codeflow-workdir-init:
        condition: service_completed_successfully
    read_only: true
    user: "65532:65532"
    cap_drop:
      - ALL
    security_opt:
      - "no-new-privileges:true"
    tmpfs:
      - /tmp:size=16m,mode=1700,uid=65532,gid=65532
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - codeflow-workdir:/workspace:ro
      - codeflow-cfsc-config:/etc/cfsc:ro
      - codeflow-cfsc-tls:/etc/cfsc-tls:ro
    networks:
      - controller-internal

  codeflow-api:
    build:
      context: .
      dockerfile: CodeFlow.Api/Dockerfile
    container_name: codeflow-api
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
      codeflow-artifacts-init:
        condition: service_completed_successfully
      codeflow-workdir-init:
        condition: service_completed_successfully
      codeflow-assistant-workspace-init:
        condition: service_completed_successfully
      codeflow-cfsc-init:
        condition: service_completed_successfully
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      CODEFLOW_DB_CONNECTION_STRING: "Server=mariadb;Port=3306;Database=codeflow;User=${CODEFLOW_DB_USER:-root};Password=${CODEFLOW_DB_PASSWORD:?CODEFLOW_DB_PASSWORD must be set in .env};"
      CodeFlow__Notifications__PublicBaseUrl: "${CODEFLOW_NOTIFICATIONS_PUBLIC_BASEURL}"
      RabbitMq__Host: rabbitmq
      RabbitMq__Port: "5672"
      RabbitMq__VirtualHost: codeflow
      RabbitMq__Username: codeflow
      RabbitMq__Password: codeflow_dev
      RabbitMq__PrefetchCount: "1"
      RabbitMq__ConsumerConcurrencyLimit: "1"
      Observability__OtlpEndpoint: http://aspire-dashboard:18889
      Observability__EnableConsoleExporter: "false"
#      Observability__OtlpEndpoint: https://otlp-gateway-<region>.grafana.net/otlp
#      Observability__OtlpHeaders__Authorization: "Basic <base64(instanceId:token)>"
      Auth__DevelopmentBypass: "true"
      Auth__RequireHttpsMetadata: "false"
      Cors__AllowedOrigins__0: http://localhost:4200
      Cors__AllowedOrigins__1: http://localhost:8080
      Artifacts__RootDirectory: /app/artifacts
      DeadLetter__ManagementHost: rabbitmq
      DeadLetter__ManagementPort: "15672"
      DeadLetter__VirtualHost: codeflow
      DeadLetter__Username: codeflow
      DeadLetter__Password: codeflow_dev
      Secrets__MasterKey: ${Secrets__MasterKey:-}
      OpenAI__ApiKey: ${OpenAI__ApiKey:-}
      Anthropic__ApiKey: ${Anthropic__ApiKey:-}
      LMStudio__ResponsesEndpoint: ${LMStudio__ResponsesEndpoint:-http://host.docker.internal:1234/v1/responses}
      # Mirrors prod: container.run routes through the sibling sandbox-controller
      # service over mTLS. Override to `Docker` to fall back to legacy direct-docker
      # (requires mounting /var/run/docker.sock onto api/worker — not done here).
      ContainerTools__Backend: ${CODEFLOW_CONTAINER_BACKEND:-SandboxController}
      SandboxController__Url: https://codeflow-sandbox-controller:8443
      SandboxController__ClientCertPath: /etc/cfsc-client/codeflow-api.pem
      SandboxController__ClientKeyPath: /etc/cfsc-client/codeflow-api.key
      SandboxController__ServerCAPath: /etc/cfsc-client/client-ca.pem
      SandboxController__ServerCommonName: codeflow-sandbox-controller
    ports:
      - "5080:8080"
    volumes:
      - codeflow-artifacts:/app/artifacts
      - codeflow-workdir:/workspace
      - codeflow-assistant-workspace:/workspace/assistant
      # Shares the dev-tls volume; SandboxController__* env vars above point at
      # the api-specific client cert files inside it.
      - codeflow-cfsc-tls:/etc/cfsc-client:ro
    networks:
      - default
      - mcp-shared
      - trefry-network
      - controller-internal
    extra_hosts:
      - "host.docker.internal:host-gateway"

  codeflow-worker:
    build:
      context: .
      dockerfile: CodeFlow.Worker/Dockerfile
    container_name: codeflow-worker
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
      codeflow-api:
        condition: service_started
      codeflow-artifacts-init:
        condition: service_completed_successfully
      codeflow-workdir-init:
        condition: service_completed_successfully
      codeflow-cfsc-init:
        condition: service_completed_successfully
    environment:
      DOTNET_ENVIRONMENT: Development
      CODEFLOW_DB_CONNECTION_STRING: "Server=mariadb;Port=3306;Database=codeflow;User=${CODEFLOW_DB_USER:-root};Password=${CODEFLOW_DB_PASSWORD:?CODEFLOW_DB_PASSWORD must be set in .env};"
      RabbitMq__Host: rabbitmq
      RabbitMq__Port: "5672"
      RabbitMq__VirtualHost: codeflow
      RabbitMq__Username: codeflow
      RabbitMq__Password: codeflow_dev
      RabbitMq__PrefetchCount: "1"
      RabbitMq__ConsumerConcurrencyLimit: "1"
      Observability__OtlpEndpoint: http://aspire-dashboard:18889
      Observability__EnableConsoleExporter: "false"
#      Observability__OtlpEndpoint: https://otlp-gateway-<region>.grafana.net/otlp
#      Observability__OtlpHeaders__Authorization: "Basic <base64(instanceId:token)>"
      Artifacts__RootDirectory: /app/artifacts
      Secrets__MasterKey: ${Secrets__MasterKey:-}
      OpenAI__ApiKey: ${OpenAI__ApiKey:-}
      Anthropic__ApiKey: ${Anthropic__ApiKey:-}
      LMStudio__ResponsesEndpoint: ${LMStudio__ResponsesEndpoint:-http://host.docker.internal:1234/v1/responses}
      ContainerTools__Backend: ${CODEFLOW_CONTAINER_BACKEND:-SandboxController}
      SandboxController__Url: https://codeflow-sandbox-controller:8443
      SandboxController__ClientCertPath: /etc/cfsc-client/codeflow-worker.pem
      SandboxController__ClientKeyPath: /etc/cfsc-client/codeflow-worker.key
      SandboxController__ServerCAPath: /etc/cfsc-client/client-ca.pem
      SandboxController__ServerCommonName: codeflow-sandbox-controller
    volumes:
      - codeflow-artifacts:/app/artifacts
      - codeflow-workdir:/workspace
      - codeflow-cfsc-tls:/etc/cfsc-client:ro
    networks:
      - default
      - mcp-shared
      - trefry-network
      - controller-internal
    extra_hosts:
      - "host.docker.internal:host-gateway"

  codeflow-ui:
    build:
      context: .
      dockerfile: codeflow-ui/Dockerfile
    container_name: codeflow-ui
    restart: unless-stopped
    depends_on:
      - codeflow-api
    environment:
      OAUTH_AUTHORITY: ${OAUTH_AUTHORITY:-}
      OAUTH_CLIENT_ID: ${OAUTH_CLIENT_ID:-codeflow-ui}
      OAUTH_SCOPE: ${OAUTH_SCOPE:-openid profile email}
    ports:
      - "4200:80"

volumes:
  codeflow-rabbitmq-data:
  codeflow-artifacts:
  codeflow-workdir:
  codeflow-assistant-workspace:
  codeflow-cfsc-tls:
  codeflow-cfsc-config:
