networks:
  mcp-shared:
    external: true
  trefry-network:
    external: true
services:
  rabbitmq:
    image: rabbitmq:4.0-management
    container_name: codeflow-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: codeflow
      RABBITMQ_DEFAULT_PASS: codeflow_dev
      RABBITMQ_DEFAULT_VHOST: codeflow
    ports:
      - "5673:5672"
      - "15673:15672"
    volumes:
      - codeflow-rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test:
        - CMD
        - rabbitmq-diagnostics
        - -q
        - ping
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  aspire-dashboard:
    image: mcr.microsoft.com/dotnet/aspire-dashboard:9.0
    container_name: codeflow-aspire-dashboard
    restart: unless-stopped
    environment:
      DASHBOARD__FRONTEND__AUTHMODE: Unsecured
      DASHBOARD__OTLP__AUTHMODE: Unsecured
    ports:
      - "18888:18888"
      - "4317:18889"

  codeflow-artifacts-init:
    image: alpine:3.20
    container_name: codeflow-artifacts-init
    restart: "no"
    command:
      - /bin/sh
      - -c
      - mkdir -p /app/artifacts && chown -R 1654:1654 /app/artifacts
    volumes:
      - codeflow-artifacts:/app/artifacts

  codeflow-workdir-init:
    image: alpine:3.20
    container_name: codeflow-workdir-init
    restart: "no"
    command:
      - /bin/sh
      - -c
      - mkdir -p /app/codeflow/workdir && chown -R 1654:1654 /app/codeflow/workdir
    volumes:
      - codeflow-workdir:/app/codeflow/workdir

  # HAA-18 — homepage assistant's per-conversation workspace root. Mounted at the same path the
  # AssistantWorkspaceProvider writes to, owned by the api container's `app` user (uid 1654) so
  # Directory.CreateDirectory succeeds when the user assigns a role with host-tool grants.
  codeflow-assistant-workspace-init:
    image: alpine:3.20
    container_name: codeflow-assistant-workspace-init
    restart: "no"
    command:
      - /bin/sh
      - -c
      - mkdir -p /app/codeflow/assistant && chown -R 1654:1654 /app/codeflow/assistant
    volumes:
      - codeflow-assistant-workspace:/app/codeflow/assistant

  codeflow-api:
    build:
      context: .
      dockerfile: CodeFlow.Api/Dockerfile
    container_name: codeflow-api
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
      codeflow-artifacts-init:
        condition: service_completed_successfully
      codeflow-workdir-init:
        condition: service_completed_successfully
      codeflow-assistant-workspace-init:
        condition: service_completed_successfully
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      CODEFLOW_DB_CONNECTION_STRING: "Server=mariadb;Port=3306;Database=codeflow;User=${CODEFLOW_DB_USER:-root};Password=${CODEFLOW_DB_PASSWORD:?CODEFLOW_DB_PASSWORD must be set in .env};"
      CodeFlow__Notifications__PublicBaseUrl: "${CODEFLOW_NOTIFICATIONS_PUBLIC_BASEURL}"
      RabbitMq__Host: rabbitmq
      RabbitMq__Port: "5672"
      RabbitMq__VirtualHost: codeflow
      RabbitMq__Username: codeflow
      RabbitMq__Password: codeflow_dev
      RabbitMq__PrefetchCount: "1"
      RabbitMq__ConsumerConcurrencyLimit: "1"
      Observability__OtlpEndpoint: http://aspire-dashboard:18889
      Observability__EnableConsoleExporter: "false"
#      Observability__OtlpEndpoint: https://otlp-gateway-<region>.grafana.net/otlp
#      Observability__OtlpHeaders__Authorization: "Basic <base64(instanceId:token)>"
      Auth__DevelopmentBypass: "true"
      Auth__RequireHttpsMetadata: "false"
      Cors__AllowedOrigins__0: http://localhost:4200
      Cors__AllowedOrigins__1: http://localhost:8080
      Artifacts__RootDirectory: /app/artifacts
      DeadLetter__ManagementHost: rabbitmq
      DeadLetter__ManagementPort: "15672"
      DeadLetter__VirtualHost: codeflow
      DeadLetter__Username: codeflow
      DeadLetter__Password: codeflow_dev
      Secrets__MasterKey: ${Secrets__MasterKey:-}
      OpenAI__ApiKey: ${OpenAI__ApiKey:-}
      Anthropic__ApiKey: ${Anthropic__ApiKey:-}
    ports:
      - "5080:8080"
    volumes:
      - codeflow-artifacts:/app/artifacts
      - codeflow-workdir:/app/codeflow/workdir
      - codeflow-assistant-workspace:/app/codeflow/assistant
    networks:
      - default
      - mcp-shared
      - trefry-network

  codeflow-worker:
    build:
      context: .
      dockerfile: CodeFlow.Worker/Dockerfile
    container_name: codeflow-worker
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
      codeflow-api:
        condition: service_started
      codeflow-artifacts-init:
        condition: service_completed_successfully
      codeflow-workdir-init:
        condition: service_completed_successfully
    environment:
      DOTNET_ENVIRONMENT: Development
      CODEFLOW_DB_CONNECTION_STRING: "Server=mariadb;Port=3306;Database=codeflow;User=${CODEFLOW_DB_USER:-root};Password=${CODEFLOW_DB_PASSWORD:?CODEFLOW_DB_PASSWORD must be set in .env};"
      RabbitMq__Host: rabbitmq
      RabbitMq__Port: "5672"
      RabbitMq__VirtualHost: codeflow
      RabbitMq__Username: codeflow
      RabbitMq__Password: codeflow_dev
      RabbitMq__PrefetchCount: "1"
      RabbitMq__ConsumerConcurrencyLimit: "1"
      Observability__OtlpEndpoint: http://aspire-dashboard:18889
      Observability__EnableConsoleExporter: "false"
#      Observability__OtlpEndpoint: https://otlp-gateway-<region>.grafana.net/otlp
#      Observability__OtlpHeaders__Authorization: "Basic <base64(instanceId:token)>"
      Artifacts__RootDirectory: /app/artifacts
      Secrets__MasterKey: ${Secrets__MasterKey:-}
      OpenAI__ApiKey: ${OpenAI__ApiKey:-}
      Anthropic__ApiKey: ${Anthropic__ApiKey:-}
    volumes:
      - codeflow-artifacts:/app/artifacts
      - codeflow-workdir:/app/codeflow/workdir
    networks:
      - default
      - mcp-shared
      - trefry-network

  codeflow-ui:
    build:
      context: .
      dockerfile: codeflow-ui/Dockerfile
    container_name: codeflow-ui
    restart: unless-stopped
    depends_on:
      - codeflow-api
    environment:
      OAUTH_AUTHORITY: ${OAUTH_AUTHORITY:-}
      OAUTH_CLIENT_ID: ${OAUTH_CLIENT_ID:-codeflow-ui}
      OAUTH_SCOPE: ${OAUTH_SCOPE:-openid profile email}
    ports:
      - "4200:80"

volumes:
  codeflow-rabbitmq-data:
  codeflow-artifacts:
  codeflow-workdir:
  codeflow-assistant-workspace:
