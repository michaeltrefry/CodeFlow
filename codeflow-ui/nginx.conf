server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        try_files $uri =404;
    }

    # runtime-config.json is templated at container start from env vars; it must never be
    # cached or a stale browser/CDN copy could send users to the wrong OIDC issuer after a
    # deploy.
    location = /runtime-config.json {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        types { application/json json; }
        try_files $uri =404;
    }

    location ~* \.(?:js|css|map|json|txt|ico|png|jpg|jpeg|gif|svg|webp|woff|woff2|ttf)$ {
        try_files $uri =404;
    }

    location /api/ {
        proxy_pass http://codeflow-api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE on /api/traces/{id}/stream keeps the connection open — disable buffering.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
