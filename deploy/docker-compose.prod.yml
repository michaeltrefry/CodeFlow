# Production compose stack for CodeFlow on the Linode host.
#
# - Consumes prebuilt images from GHCR (CODEFLOW_*_IMAGE env vars include the full ghcr.io/...:tag).
# - Does NOT run RabbitMQ (uses external mqapps.trefry.net) or Aspire dashboard.
# - Connects to the host-shared MariaDB at hostname `mariadb` on the external `trefry-network`.
# - Binds host ports for codeflow-api and codeflow-ui to 127.0.0.1 only — Caddy on the host fronts
#   them at https://codeflow.trefry.net.
# - codeflow-worker exposes nothing on the host.
#
# Required env vars are listed in deploy/.env.example. The GitHub Actions deploy workflow writes
# them to /opt/codeflow/.env.release before `docker compose --env-file .env.release ... up -d`.

networks:
  trefry-network:
    external: true
  # sc-535: controller-internal network — internal: true means containers on
  # this network have NO route to the public internet. Image pulls happen at
  # dockerd (host-network), not from inside the controller. See
  # docs/sandbox-executor.md §6.2.
  controller-internal:
    internal: true
    driver: bridge

services:
  # Init container: chowns the bind-mounted host dirs to the app uid (1654, see
  # CodeFlow.Api/Dockerfile) on every `up`. Without this, a host dir created as root (e.g. by a
  # one-off `mkdir -p /opt/codeflow/assistant` from a sudo'd shell) stays root-owned and the api +
  # worker can't write into it — manifesting as `EACCES` on the assistant's per-conversation
  # workspace and on the saga's per-trace workdirs. Doing the chown from inside Docker means we
  # don't need NOPASSWD sudo on the deploy host or for LINODE_USER to own the dirs already; this
  # container has root inside its own namespace by default and can chown any bind-mounted path.
  # Runs once per `up` and exits (`restart: no`); api/worker gate on it via depends_on.
  codeflow-init:
    image: busybox:1.36
    container_name: codeflow-init
    user: "0:0"
    command:
      - sh
      - -c
      - |
        set -e
        # App-uid-owned dirs (api/worker run as 1654).
        mkdir -p /target/assistant /target/workdir /target/artifacts
        chown -R 1654:1654 /target/assistant /target/workdir /target/artifacts
        # sc-535: api + worker mTLS client material. bootstrap-ca.sh writes
        # client.{pem,key} as the bootstrap user (often root) at mode 0640;
        # without a chown the api/worker can't read client.key and every /run
        # call into the controller fails with UnauthorizedAccessException.
        # The dirs may not exist yet on a fresh host (controller hasn't been
        # bootstrapped) — `|| true` keeps init green so the api/worker can
        # still come up; they fail-soft on /run when certs are missing.
        if [ -d /target/cfsc-client-api ]; then
          chown -R 1654:1654 /target/cfsc-client-api || true
        fi
        if [ -d /target/cfsc-client-worker ]; then
          chown -R 1654:1654 /target/cfsc-client-worker || true
        fi
        # sc-535: controller TLS material. Controller runs as 65532 (distroless
        # nonroot) and needs to read server.key (mode 0640). Same problem,
        # different uid.
        if [ -d /target/cfsc-tls ]; then
          chown -R 65532:65532 /target/cfsc-tls || true
        fi
    volumes:
      - ${CODEFLOW_ASSISTANT_DIR:-/opt/codeflow/assistant}:/target/assistant
      - ${CODEFLOW_WORKDIRS_DIR:-/opt/codeflow/workdirs}:/target/workdir
      - ${CODEFLOW_ARTIFACTS_DIR:-/opt/codeflow/artifacts}:/target/artifacts
      # sc-535: client mTLS dirs are bind-mounted RW here so we can chown
      # them to the api/worker uid before the api/worker mount them :ro.
      - ${CODEFLOW_CFSC_CLIENT_DIR:-/opt/codeflow/cfsc-client/api}:/target/cfsc-client-api
      - ${CODEFLOW_CFSC_CLIENT_WORKER_DIR:-/opt/codeflow/cfsc-client/worker}:/target/cfsc-client-worker
      - ${CODEFLOW_CFSC_TLS_DIR:-/opt/codeflow/cfsc/tls}:/target/cfsc-tls
    restart: "no"

  codeflow-api:
    image: ${CODEFLOW_API_IMAGE:?CODEFLOW_API_IMAGE must be set (full ghcr.io/<owner>/codeflow-api:<tag>)}
    container_name: codeflow-api
    restart: unless-stopped
    depends_on:
      codeflow-init:
        condition: service_completed_successfully
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      # --- Auth (Slice 1 + 2). DevelopmentBypass MUST be false; Authority/Audience must be set. ---
      Auth__DevelopmentBypass: "false"
      Auth__RequireHttpsMetadata: "true"
      Auth__Authority: ${CODEFLOW_AUTH_AUTHORITY:?CODEFLOW_AUTH_AUTHORITY must be set (e.g. https://identity.trefry.net/realms/trefry)}
      Auth__Audience: ${CODEFLOW_AUTH_AUDIENCE:?CODEFLOW_AUTH_AUDIENCE must be set (e.g. codeflow-api)}
      # --- CORS for the public origin (Slice 2 / config-driven). ---
      Cors__AllowedOrigins__0: ${CODEFLOW_PUBLIC_ORIGIN:-https://codeflow.trefry.net}
      # --- Notification action links (HITL emails etc.) point back at the public UI. ---
      CodeFlow__Notifications__PublicBaseUrl: ${CODEFLOW_PUBLIC_ORIGIN:-https://codeflow.trefry.net}
      # --- Persistence: shared MariaDB on trefry-network (hostname `mariadb`). ---
      CODEFLOW_DB_CONNECTION_STRING: ${CODEFLOW_DB_CONNECTION_STRING:?CODEFLOW_DB_CONNECTION_STRING must be set (Server=mariadb;Port=3306;Database=codeflow;User=...;Password=...;)}
      # --- Bus: external RabbitMQ at mqapps.trefry.net. ---
      RabbitMq__Host: ${CODEFLOW_RABBITMQ_HOST:-mqapps.trefry.net}
      RabbitMq__Port: ${CODEFLOW_RABBITMQ_PORT:-5672}
      RabbitMq__VirtualHost: ${CODEFLOW_RABBITMQ_VHOST:?CODEFLOW_RABBITMQ_VHOST must be set (e.g. codeflow)}
      RabbitMq__Username: ${CODEFLOW_RABBITMQ_USERNAME:?CODEFLOW_RABBITMQ_USERNAME must be set}
      RabbitMq__Password: ${CODEFLOW_RABBITMQ_PASSWORD:?CODEFLOW_RABBITMQ_PASSWORD must be set}
      RabbitMq__PrefetchCount: "1"
      RabbitMq__ConsumerConcurrencyLimit: "1"
      # --- Secrets master key (AesGcmSecretProtector) and optional model API keys. ---
      Secrets__MasterKey: ${CODEFLOW_SECRETS_MASTER_KEY:?CODEFLOW_SECRETS_MASTER_KEY must be set (32-byte base64 key)}
      OpenAI__ApiKey: ${CODEFLOW_OPENAI_API_KEY:-}
      Anthropic__ApiKey: ${CODEFLOW_ANTHROPIC_API_KEY:-}
      # --- Artifacts (host bind below). ---
      Artifacts__RootDirectory: /app/artifacts
      # --- Dead-letter management (RabbitMQ HTTP). ---
      DeadLetter__ManagementHost: ${CODEFLOW_RABBITMQ_HOST:-mqapps.trefry.net}
      DeadLetter__ManagementPort: ${CODEFLOW_RABBITMQ_MANAGEMENT_PORT:-15672}
      DeadLetter__VirtualHost: ${CODEFLOW_RABBITMQ_VHOST}
      DeadLetter__Username: ${CODEFLOW_RABBITMQ_USERNAME}
      DeadLetter__Password: ${CODEFLOW_RABBITMQ_PASSWORD}
      # --- Optional: OTLP observability sink. ---
      Observability__OtlpEndpoint: ${CODEFLOW_OTLP_ENDPOINT:-}
      Observability__EnableConsoleExporter: "false"
      # --- sc-532: sandbox-controller backend selection. Default Docker keeps the legacy
      # CLI runner (which is inert in this container — see PR #208 / sc-526). Prod sets
      # SandboxController to route through the new mTLS controller below.
      ContainerTools__Backend: ${CODEFLOW_CONTAINER_BACKEND:-SandboxController}
      SandboxController__Url: https://codeflow-sandbox-controller:8443
      SandboxController__ClientCertPath: /etc/cfsc-client/client.pem
      SandboxController__ClientKeyPath: /etc/cfsc-client/client.key
      SandboxController__ServerCAPath: /etc/cfsc-client/server-ca.pem
      SandboxController__ServerCommonName: codeflow-sandbox-controller
      SandboxController__RequestTimeoutSeconds: ${CODEFLOW_CONTAINER_REQUEST_TIMEOUT_SECONDS:-1800}
    ports:
      - "127.0.0.1:${CODEFLOW_API_HOST_PORT:-5080}:8080"
    volumes:
      - ${CODEFLOW_ARTIFACTS_DIR:-/opt/codeflow/artifacts}:/app/artifacts
      # Host-shared per-trace git workdirs for code-aware workflows. Both api and worker mount
      # the same host path so saga workdir cleanup (api side) and saga workdir provisioning
      # (worker side) see identical contents. The container path is locked to
      # WorkspaceOptions.WorkingDirectoryRoot's default (`/workspace`) — overridable via
      # Workspace__WorkingDirectoryRoot if a deployment needs a different mount target.
      - ${CODEFLOW_WORKDIRS_DIR:-/opt/codeflow/workdirs}:/workspace
      # Per-conversation assistant workspace (HAA-19). API-only — the worker doesn't host the
      # assistant chat loop. Persists conversation file content across container recreations;
      # without this mount the dir is image-baked and contents are lost on `docker compose up`.
      # Container path is locked to WorkspaceOptions.AssistantWorkspaceRoot's default
      # (`/workspace/assistant`) — override via Workspace__AssistantWorkspaceRoot if a deployment
      # needs a different mount target. Mounted as a nested bind under /workspace so agents see
      # one unified writable tree.
      - ${CODEFLOW_ASSISTANT_DIR:-/opt/codeflow/assistant}:/workspace/assistant
      # sc-535: client mTLS material for the sandbox-controller. Same dir on every host;
      # sc-535 host-setup runbook documents how to provision it.
      - ${CODEFLOW_CFSC_CLIENT_DIR:-/opt/codeflow/cfsc-client/api}:/etc/cfsc-client:ro
    networks:
      - default
      - trefry-network
      - controller-internal

  codeflow-worker:
    image: ${CODEFLOW_WORKER_IMAGE:?CODEFLOW_WORKER_IMAGE must be set (full ghcr.io/<owner>/codeflow-worker:<tag>)}
    container_name: codeflow-worker
    restart: unless-stopped
    depends_on:
      codeflow-init:
        condition: service_completed_successfully
      codeflow-api:
        condition: service_started
    environment:
      DOTNET_ENVIRONMENT: Production
      CODEFLOW_DB_CONNECTION_STRING: ${CODEFLOW_DB_CONNECTION_STRING}
      RabbitMq__Host: ${CODEFLOW_RABBITMQ_HOST:-mqapps.trefry.net}
      RabbitMq__Port: ${CODEFLOW_RABBITMQ_PORT:-5672}
      RabbitMq__VirtualHost: ${CODEFLOW_RABBITMQ_VHOST}
      RabbitMq__Username: ${CODEFLOW_RABBITMQ_USERNAME}
      RabbitMq__Password: ${CODEFLOW_RABBITMQ_PASSWORD}
      RabbitMq__PrefetchCount: "1"
      RabbitMq__ConsumerConcurrencyLimit: "1"
      Secrets__MasterKey: ${CODEFLOW_SECRETS_MASTER_KEY}
      OpenAI__ApiKey: ${CODEFLOW_OPENAI_API_KEY:-}
      Anthropic__ApiKey: ${CODEFLOW_ANTHROPIC_API_KEY:-}
      Artifacts__RootDirectory: /app/artifacts
      Observability__OtlpEndpoint: ${CODEFLOW_OTLP_ENDPOINT:-}
      Observability__EnableConsoleExporter: "false"
      # sc-532: sandbox-controller backend (same wiring as codeflow-api).
      ContainerTools__Backend: ${CODEFLOW_CONTAINER_BACKEND:-SandboxController}
      SandboxController__Url: https://codeflow-sandbox-controller:8443
      SandboxController__ClientCertPath: /etc/cfsc-client/client.pem
      SandboxController__ClientKeyPath: /etc/cfsc-client/client.key
      SandboxController__ServerCAPath: /etc/cfsc-client/server-ca.pem
      SandboxController__ServerCommonName: codeflow-sandbox-controller
      SandboxController__RequestTimeoutSeconds: ${CODEFLOW_CONTAINER_REQUEST_TIMEOUT_SECONDS:-1800}
    volumes:
      - ${CODEFLOW_ARTIFACTS_DIR:-/opt/codeflow/artifacts}:/app/artifacts
      - ${CODEFLOW_WORKDIRS_DIR:-/opt/codeflow/workdirs}:/workspace
      # sc-535: separate client cert dir for the worker (different subject than api).
      - ${CODEFLOW_CFSC_CLIENT_WORKER_DIR:-/opt/codeflow/cfsc-client/worker}:/etc/cfsc-client:ro
    networks:
      - default
      - trefry-network
      - controller-internal

  codeflow-ui:
    image: ${CODEFLOW_UI_IMAGE:?CODEFLOW_UI_IMAGE must be set (full ghcr.io/<owner>/codeflow-ui:<tag>)}
    container_name: codeflow-ui
    restart: unless-stopped
    depends_on:
      - codeflow-api
    environment:
      OAUTH_AUTHORITY: ${CODEFLOW_AUTH_AUTHORITY}
      OAUTH_CLIENT_ID: ${CODEFLOW_OAUTH_CLIENT_ID:-codeflow-ui}
      OAUTH_SCOPE: ${CODEFLOW_OAUTH_SCOPE:-openid profile email}
    ports:
      - "127.0.0.1:${CODEFLOW_UI_HOST_PORT:-4200}:80"

  # ===========================================================================
  # sc-535: Sandbox controller. Phase 1 deploy — same VM as the rest of the
  # CodeFlow stack but the only service with /var/run/docker.sock access. The
  # api/worker have NO docker access; they call the controller over the
  # internal-only `controller-internal` network. See docs/sandbox-executor.md
  # §6 for the architecture.
  #
  # Hardening flags (sc-538): distroless static base, read_only rootfs,
  # cap_drop ALL, no-new-privileges, AppArmor + seccomp profiles, nonroot uid,
  # internal-only network, never published to the host.
  #
  # Host setup is documented in deploy/sandbox-controller/host-setup.md —
  # runsc / AppArmor / seccomp / mTLS material must be in place before
  # `docker compose up codeflow-sandbox-controller`.
  # ===========================================================================
  codeflow-sandbox-controller:
    image: ${CODEFLOW_SANDBOX_CONTROLLER_IMAGE:?CODEFLOW_SANDBOX_CONTROLLER_IMAGE must be set (full ghcr.io/<owner>/codeflow-sandbox-controller:<tag>)}
    container_name: codeflow-sandbox-controller
    restart: unless-stopped

    # === Runtime hardening (sc-538). Each lever is independent — removing any
    # of them is a security regression. See deploy/sandbox-controller/HARDENING.md
    # in the sandbox-controller subtree for the lever-to-threat mapping.
    read_only: true
    user: "65532:65532"   # distroless `nonroot`
    cap_drop:
      - ALL
    security_opt:
      - "no-new-privileges:true"
      # seccomp profile lives under /opt/codeflow so the deploy user can write
      # it without sudo. The deploy workflow scps the file from the repo on
      # every deploy.
      - "seccomp=${CFSC_SECCOMP_PROFILE_PATH:-/opt/codeflow/cfsc/seccomp/cfsc.json}"
      # AppArmor profile install requires sudo (apparmor_parser), which the
      # deploy user doesn't have. After a one-time host-setup pass per
      # deploy/sandbox-controller/host-setup.md §2, the operator sets
      # CFSC_APPARMOR_PROFILE=codeflow-sandbox-controller in repo vars.
      # Until then, "unconfined" runs the controller without AppArmor — the
      # other six hardening levers (cap_drop ALL, no-new-privileges, seccomp,
      # read_only, internal-network, nonroot uid) still hold.
      - "apparmor=${CFSC_APPARMOR_PROFILE:-unconfined}"

    # group_add gives uid 65532 supplementary membership in the host's docker
    # group (variable gid). Required for socket access — sc-535 host-setup
    # writes DOCKER_GID into .env.release.
    group_add:
      - "${DOCKER_GID:?DOCKER_GID must be set (run `getent group docker | cut -d: -f3` on the host)}"

    tmpfs:
      - /tmp:size=16m,mode=1700,uid=65532,gid=65532

    volumes:
      # The one privileged operation: socket access. read_only on the container
      # filesystem doesn't apply to bind-mounted hosts; the daemon ACL is what
      # gates this.
      - /var/run/docker.sock:/var/run/docker.sock
      # Workspace root — read-only from the controller's perspective. Bind-mounted at the same
      # in-container path the api/worker use (`/workspace`) so the controller's `workdir_root`
      # config and the spec.WorkspaceHostPath the controller hands to dockerd both reference one
      # canonical path. Dockerd then re-mounts the per-trace subdir into the sandbox RW.
      - ${CODEFLOW_WORKDIRS_DIR:-/opt/codeflow/workdirs}:/workspace:ro
      # Per-host config — config.toml mounts at /etc/cfsc/config.toml (the
      # controller's default `-config` flag).
      - ${CODEFLOW_CFSC_CONFIG_DIR:-/opt/codeflow/cfsc/config}:/etc/cfsc:ro
      # mTLS material lives in a sibling host directory (bootstrap-ca.sh writes
      # it to /opt/codeflow/cfsc/tls/). Mounted at /etc/cfsc-tls/ inside the
      # container — NOT nested under /etc/cfsc, because read_only:true makes
      # the rootfs overlay read-only and Docker can't mkdir a child mountpoint
      # under another bind-mounted parent on a read-only fs (compose silently
      # accepts the overlap but dockerd rejects it at create time). Keep it
      # un-nested. Operator's config.toml must reference /etc/cfsc-tls/* paths.
      - ${CODEFLOW_CFSC_TLS_DIR:-/opt/codeflow/cfsc/tls}:/etc/cfsc-tls:ro

    # NO `ports:` — controller is reachable only via controller-internal.
    networks:
      - controller-internal

    # Wait until the api/worker are likely scheduled before starting; not strictly
    # required (controller is mTLS-only, callers retry), but it cleans up startup
    # log noise.
    depends_on:
      codeflow-init:
        condition: service_completed_successfully

    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
